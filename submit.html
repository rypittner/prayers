<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Prayer Intentions for Ryan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yrsa:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EEECE9;
            --primary-accent: #558a99;
            --text-color: #333333;
            --card-bg: #FFFFFF;
            --radius-main: 16px;
            --radius-input: 8px;
            --shadow-subtle: 0 4px 15px rgba(0,0,0,0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-subtle);
        }

        h1 {
            font-family: 'Yrsa', serif;
            color: var(--primary-accent);
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #DDDDDD;
            border-radius: var(--radius-input);
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: var(--radius-input);
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
        }

        #statusMsg {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Prayer Intentions</h1>
    <p>Please let me know how I can pray for your below!</p>
    
    <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="pName" placeholder="Name or Anonymous">
    </div>

    <div class="input-group">
        <label>Prayer Request</label>
        <textarea id="pRequest" rows="5" placeholder="How can I pray for you?"></textarea>
    </div>

    <button id="submitBtn">Submit Intenion</button>
    <div id="statusMsg"></div>
</div>

<script>
    const BIN_ID = "6a386bb8f5f4af5e291a1c9e";
    const MASTER_KEY = "$2a$10$uWA6RwV4hxUT6D49HU56VuPjVsoNcHcTmf.jSgx.o6RXd2G1wGyse";
    const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    submitBtn.onclick = async () => {
        const name = document.getElementById('pName').value;
        const request = document.getElementById('pRequest').value;

        if(!name || !request) {
            alert('Please fill out both fields.');
            return;
        }

        submitBtn.innerText = "Sending...";
        
        try {
            // 1. Get existing data
            const getRes = await fetch(BASE_URL, { headers: { "X-Master-Key": MASTER_KEY } });
            const data = await getRes.json();
            const currentList = data.record || [];

            // 2. Add new entry
            currentList.push({
                name,
                request,
                date: new Date().toISOString().split('T')[0],
                count: 0,
                archived: false
            });

            // 3. Save back
            await fetch(BASE_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(currentList)
            });

            statusMsg.innerText = "Thank you for submitting your intentions. Know of my prayers for you! ~Ryan Pittner.";
            document.getElementById('pName').value = '';
            document.getElementById('pRequest').value = '';
        } catch (e) {
            statusMsg.innerText = "Error sending request. Please try again.";
        }
        submitBtn.innerText = "Submit Request";
    };
</script>

</body>
</html>
