<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Prayer Intentions for Ryan</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("zbZDp2BUwfWziJlP8"); })();
    </script>
    <link rel="icon" type="image/x-icon" href="https://focus.org/wp-content/uploads/2023/03/cropped-focusicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Yrsa:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EEECE9;
            --primary-accent: #00437A;
            --text-color: #333333;
            --card-bg: #FFFFFF;
        }

        body {
        
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
        border-top: 8px solid #00437A;
        
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .header { margin-bottom: 30px; }

        #logoIMG { height: 50px; margin-bottom: 15px; }

        h1 {
            font-family: 'Yrsa', serif;
            color: var(--primary-accent);
            font-size: 2rem;
            margin: 0;
            line-height:1;
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            border: 1.5px solid #E0E0E0;
            border-radius: 14px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-accent);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        /* Footer Section */
        .footer-section {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 3px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-align: left;
        }

        .profile-pic {
            width: 75px;
            height: 75px;
            background-color: #ddd;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        #statusMsg {
            margin-top: 20px;
            font-size: 0.9rem;
            color: black;
            min-height: 1.2em;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img id="logoIMG" src="https://focus.org/wp-content/uploads/2023/03/cropped-focusicon-192x192.png" alt="Logo">
        <h1>Your Prayer Intentions</h1>
    </div>
    
    <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="pName" placeholder="Name">
    </div>

    <div class="input-group">
        <label>Prayer Request</label>
        <textarea id="pRequest" rows="4" placeholder="How can I pray for you?"></textarea>
    </div>

    <button id="submitBtn" disabled>Submit Intention</button>
    
    <div id="statusMsg"></div>

    <div class="footer-section">
        <img id="profileIMG" src="https://focus.org/wp-content/uploads/2024/03/NST25_RyanPittner.jpeg" alt="Profile" class="profile-pic">
        <p style="margin: 0; font-weight: 600; color: var(--primary-accent);">Know of my prayers for you, <br><span class="bigger">Ryan Pittner</p>
    </div>
</div>

<script>
    const BIN_ID = "6a386bb8f5f4af5e291a1c9e";
    const MASTER_KEY = "$2a$10$uWA6RwV4hxUT6D49HU56VuPjVsoNcHcTmf.jSgx.o6RXd2G1wGyse";
    const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const nameInput = document.getElementById('pName');
    const requestInput = document.getElementById('pRequest');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    const validateForm = () => {
        submitBtn.disabled = !(nameInput.value.trim() !== '' && requestInput.value.trim() !== '');
    };

    nameInput.addEventListener('input', validateForm);
    requestInput.addEventListener('input', validateForm);

    submitBtn.onclick = async () => {
        const name = nameInput.value;
        const request = requestInput.value;
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";
        
        try {
            const getRes = await fetch(BASE_URL, { headers: { "X-Master-Key": MASTER_KEY } });
            const data = await getRes.json();
            const currentList = data.record || [];
            currentList.push({ name, request, date: new Date().toISOString().split('T')[0], count: 0, archived: false });

            await fetch(BASE_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(currentList)
            });

            await emailjs.send("service_njo15ot", "template_d11rwug", { pName: name, pRequest: request });

            statusMsg.innerText = "🙏🏻 Your intention was recieved. I am praying for you!";
            nameInput.value = ''; requestInput.value = '';
        } catch (e) {
            statusMsg.innerText = "Error: Please check your connection.";
            submitBtn.disabled = false;
        }
        submitBtn.innerText = "Submit Intention";
    };
</script>

</body>
</html>
