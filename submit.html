<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Submit a Prayer Intentions</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("zbZDp2BUwfWziJlP8"); })();
    </script>
    <link rel="icon" type="image/x-icon" href="https://focus.org/wp-content/uploads/2023/03/cropped-focusicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F4F3F0;
            --panel: #FFFFFF;
            --blue: #00437A;
            --text: #1a1a1a;
            --gray: #888;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden; /* Prevents horizontal scroll */
        }

        .app-container {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            padding: 48px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 2px solid rgba(0,0,0,0.1);
            box-sizing: border-box; /* Crucial for keeping padding inside width */
        }

        /* Mobile full-width adjustment */
        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 0;
            }
            .app-container {
                max-width: 100vw;
                border-radius: 0;
                border-left: none;
                border-right: none;
                padding: 40px;
                min-height: 100vh;
                box-shadow: none;
            }
        }

        .header-section { margin-bottom: 40px; }
        .logo { height: 40px; margin-bottom: 24px; }
        
        h1 { 
            font-family: 'Cardo', serif; 
            font-size: 2.5rem; 
            font-weight: 500; 
            margin: 0; 
            color: var(--blue); 
            letter-spacing: -0.02em; 
        }
        
        p.subtitle { color: var(--gray); font-size: 0.95rem; margin-top: 8px; }

        .form-group { margin-bottom: 24px; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray); font-weight: 600; display: block; margin-bottom: 12px; }
        
        input, textarea {
            width: 100%;
            padding: 16px;
            background: #F9F9F7;
            border: 1px solid #EAEAE8;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box; /* Ensures padding does not cause overflow */
            display: block;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            background: #FFF;
            box-shadow: 0 4px 12px rgba(0,67,122,0.08);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--blue);
            color: #FFF;
            border: none;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.3s;
        }
        .submit-btn:hover { background: #005A9E; transform: translateY(-2px); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { background-color: #cccccc; cursor: not-allowed; transform: none; }

        .footer-credit {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
        }
        .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .credit-text { font-size: 1rem; font-weight: 500; line-height: 1.4; }
        
        #statusMsg {
          margin-top: 20px;
          font-size: 1rem;
          color: var(--blue);
          text-align: center;
          min-height: 1.2em;
          font-weight: 600;
          line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <img src="https://focus.org/wp-content/uploads/2023/03/cropped-focusicon-192x192.png" class="logo" alt="Logo">
        <h1>Prayer Intentions</h1>
        <p class="subtitle">Let me know how I can pray for you below!</p>
    </div>

    <div class="form-group">
        <label>Name</label>
        <input type="text" id="pName" placeholder="Your name">
    </div>
    <div class="form-group">
        <label>Intention</label>
        <textarea id="pRequest" rows="4" placeholder="How can I pray for you today?"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" disabled>Send Intention</button>
    <div id="statusMsg"></div>

    <div class="footer-credit">
        <img src="https://focus.org/wp-content/uploads/2024/03/NST25_RyanPittner.jpeg" class="avatar" alt="Ryan Pittner">
        <div class="credit-text">In Christ, Ryan Pittner<br><span style="color:var(--gray); font-weight:300;">FOCUS Missionary at UNLV</span></div>
    </div>
</div>

<script>
    const BIN_ID = "6a386bb8f5f4af5e291a1c9e";
    const MASTER_KEY = "$2a$10$uWA6RwV4hxUT6D49HU56VuPjVsoNcHcTmf.jSgx.o6RXd2G1wGyse";
    const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    const nameInput = document.getElementById('pName');
    const requestInput = document.getElementById('pRequest');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    const validateForm = () => {
        submitBtn.disabled = !(nameInput.value.trim() !== '' && requestInput.value.trim() !== '');
    };

    nameInput.addEventListener('input', validateForm);
    requestInput.addEventListener('input', validateForm);

    submitBtn.onclick = async () => {
        const name = nameInput.value;
        const request = requestInput.value;
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";
        
        try {
            const getRes = await fetch(BASE_URL, { headers: { "X-Master-Key": MASTER_KEY } });
            const data = await getRes.json();
            const currentList = data.record || [];
            currentList.push({ name, request, date: new Date().toISOString().split('T')[0], count: 0, archived: false });

            await fetch(BASE_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(currentList)
            });

            await emailjs.send("service_njo15ot", "template_d11rwug", { pName: name, pRequest: request });

            statusMsg.innerText = "🙏🏻 Your intention was received. I am praying for you!";
            nameInput.value = ''; 
            requestInput.value = '';
            validateForm();
        } catch (e) {
            statusMsg.innerText = "Error: Please check your connection.";
            submitBtn.disabled = false;
        }
        submitBtn.innerText = "Send Intention";
    };
</script>

</body>
</html>
